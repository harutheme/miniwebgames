<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 427" width="620" height="427" role="img" aria-label="Donut chart: 12 total consents with accepted, rejected, and partially accepted in legend">
	<defs>
		<filter id="blur" x="-10%" y="-10%" width="120%" height="120%">
			<feGaussianBlur stdDeviation="2.5" />
		</filter>
	</defs>
	<rect width="620" height="427" fill="#ffffff" />
	<g filter="url(#blur)">
	<!-- Donut: center (222,213), outer r=182, inner r=144 (80% cutout) -->
	<!-- Green (Accepted): large ~300° arc, clockwise from 1 o'clock to 11 o'clock -->
	<path
		fill="#C6E5D9"
		d="M 313 55.2 A 182 182 0 1 1 131 55.2 L 150 88.3 A 144 144 0 1 0 294 88.3 Z"
	/>
	<!-- Pink (Rejected): small ~60° arc at top, from 11 o'clock to 1 o'clock -->
	<path
		fill="#FBCACF"
		d="M 131 55.2 A 182 182 0 0 1 313 55.2 L 294 88.3 A 144 144 0 0 0 150 88.3 Z"
	/>
	<!-- Center text -->
	<text
		x="222"
		y="199"
		text-anchor="middle"
		font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
		font-size="64"
		font-weight="700"
		fill="#111111"
		dominant-baseline="middle"
	>12</text>
	<text
		x="222"
		y="248"
		text-anchor="middle"
		font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
		font-size="22"
		font-weight="400"
		fill="#111111"
		dominant-baseline="middle"
	>Total Consents</text>
	<!-- Legend -->
	<g
		font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
		font-size="14"
		fill="#1d2327"
	>
		<g transform="translate(427, 124)">
			<rect width="20" height="20" fill="#C6E5D9" />
			<text x="30" y="10" dominant-baseline="middle">Accepted</text>
		</g>
		<g transform="translate(427, 194)">
			<rect width="20" height="20" fill="#FBCACF" />
			<text x="30" y="10" dominant-baseline="middle">Rejected</text>
		</g>
		<g transform="translate(427, 258)">
			<rect width="20" height="20" fill="#A2C9FC" />
			<text x="30" y="10" dominant-baseline="middle">Partially Accepted</text>
		</g>
	</g>
	</g>
</svg>
